<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATSA | Asistente Minero IA</title>

<!-- Estilos -->
<link rel="stylesheet" href="styles.css">

<!-- Librerías externas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.0/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<!-- Módulos propios — orden importante -->
<script src="config.js"></script>
<script src="data.js"></script>
<script src="charts.js"></script>
<script src="export.js"></script>
<script src="ui.js"></script>
<script src="chat.js"></script>
</head>
<body>

<!-- ── HEADER ── -->
<div id="header">
  <div id="header-left">
    <div id="logo-box">SF</div>
    <div>
      <div id="header-title">Sandfire MATSA · Asistente Minero IA</div>
      <div id="header-subtitle">Reconciliación de Cámaras — Análisis inteligente</div>
    </div>
  </div>
  <div id="header-right">
    <div id="estado">Sin datos cargados</div>
    <button class="btn-header" id="btn-cargar" onclick="document.getElementById('file-input').click()">📂 Cargar datos</button>
    <button class="btn-header" id="btn-exportar-txt" onclick="ExportManager.exportarTXT()">📝 Exportar TXT</button>
    <button class="btn-header" id="btn-exportar" onclick="ExportManager.exportarPDF()">📄 Exportar PDF</button>
    <button class="btn-header" id="btn-limpiar" onclick="ChatManager.limpiarHistorial()">🗑️ Limpiar</button>
    <input type="file" id="file-input" accept=".csv" onchange="App.cargarCSV(event)">
  </div>
</div>

<!-- ── CONTEXTO POWER BI ── -->
<div id="contexto-box">Sin contexto de Power BI. Carga un CSV para comenzar el análisis.</div>

<!-- ── BOTONERA DE ACCIONES ── -->
<div id="botonera"></div>

<!-- ── CHAT ── -->
<div id="chat"></div>

<!-- ── INPUT ── -->
<div id="input-area">
  <input
    id="input"
    type="text"
    placeholder="Pregunta por una cámara, zona, estadística o pide una gráfica..."
    onkeydown="if(event.key==='Enter') App.enviar()"
    disabled
  />
  <button class="send" id="send-btn" onclick="App.enviar()" disabled>Enviar</button>
</div>

<script>
// ── CONTROLADOR PRINCIPAL ──
const App = {

  init() {
    // Leer contexto de URL (Power BI)
    try {
      const search = window.location.search;
      const ctxIndex = search.indexOf("ctx=");
      if (ctxIndex !== -1) {
        const ctx = decodeURIComponent(search.substring(ctxIndex + 4).replace(/\+/g, " "));
        ChatManager.init(ctx);
        document.getElementById("contexto-box").innerText = "📊 " + ctx;
      } else {
        ChatManager.init("");
      }
    } catch(e) {
      ChatManager.init("");
    }

    // Inicializar UI
    UI.init();
  },

  cargarCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    DataManager.cargarCSV(file, (metadatos) => {
      UI.actualizarEstado(metadatos);
      UI.mostrarBienvenida(metadatos);
      // Alertas automáticas al cargar
      setTimeout(() => ChatManager.analizarAlertas(), 500);
    });
  },

  enviar() {
    const input = document.getElementById("input");
    const texto = input.value.trim();
    if (!texto) return;
    input.value = "";
    ChatManager.enviar(texto);
  }
};

// Arrancar al cargar la página
window.addEventListener("DOMContentLoaded", () => App.init());
</script>
</body>
</html>
